name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-uber-jar:
    runs-on: ubuntu-latest
    name: Build uber-JAR

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build uber-JAR
        run: mvn package -DskipTests

      - name: Rename artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp target/html-saurus.jar "html-saurus-${TAG}.jar"
          echo "ARTIFACT=html-saurus-${TAG}.jar" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: uber-jar
          path: ${{ env.ARTIFACT }}

  release:
    needs: build-uber-jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
